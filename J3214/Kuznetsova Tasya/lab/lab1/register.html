<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация -  Round the World</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-map-marked-alt"></i>  Round the World
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="search.html"><i class="fas fa-compass"></i> Поиск</a></li>
                    <li class="nav-item"><a class="nav-link" href="feed.html"><i class="fas fa-globe"></i> Лента</a></li>
                    <li class="nav-item"><a class="nav-link" href="create-trip.html"><i class="fas fa-map"></i> Создать</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html"><i class="fas fa-sign-in-alt"></i> Вход</a></li>
                    <li class="nav-item"><a class="nav-link btn-register active" href="register.html"><i class="fas fa-user-plus"></i> Регистрация</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="auth-card">
                        <div class="text-center mb-4">
                            <i class="fas fa-map-marked-alt fa-3x text-primary mb-3"></i>
                            <h2 class="h3 fw-bold">Начни своё путешествие</h2>
                            <p class="text-muted">Присоединяйся к сообществу путешественников</p>
                        </div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Как вас зовут?</label>
                                <input type="text" class="form-control form-control-lg" id="regName">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="text" class="form-control form-control-lg" id="regEmail">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Телефон (необязательно)</label>
                                <input type="tel" class="form-control form-control-lg" id="regPhone">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" class="form-control form-control-lg" id="regPassword">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Подтвердите пароль</label>
                                <input type="password" class="form-control form-control-lg" id="regConfirmPassword">
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 mb-3">
                                <i class="fas fa-user-plus me-2"></i>Создать аккаунт
                            </button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <p class="mb-0">
                                Уже есть аккаунт? 
                                <a href="login.html" class="text-primary fw-bold">Войти</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="fas fa-check-circle"></i> Добро пожаловать!</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <i class="fas fa-smile-wink fa-4x text-success mb-3"></i>
                    <p class="lead">заглушка</p>
                    <p class="text-muted">Теперь вы можете войти в свой аккаунт</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <a href="login.html" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </a>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer py-4 mt-5">
        <div class="container text-center">
            <p class="text-white-50 small mb-0"> Round the World </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            new bootstrap.Modal(document.getElementById('successModal')).show();
        });
    </script>
</body>
</html>
