<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск -  Round the World</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-map-marked-alt"></i>  Round the World</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="search.html"><i class="fas fa-compass"></i> Поиск</a></li>
                    <li class="nav-item"><a class="nav-link" href="feed.html"><i class="fas fa-globe"></i> Лента</a></li>
                    <li class="nav-item"><a class="nav-link" href="create-trip.html"><i class="fas fa-map"></i> Создать</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html"><i class="fas fa-sign-in-alt"></i> Вход</a></li>
                    <li class="nav-item"><a class="nav-link btn-register" href="register.html"><i class="fas fa-user-plus"></i> Регистрация</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="search-section">
        <div class="container">
            <div class="row">
                <div class="col-lg-3 mb-4">
                    <div class="card shadow-sm border-0 rounded-4 sticky-top" style="top: 90px;">
                        <div class="card-header bg-primary text-white rounded-top-4">
                            <h5 class="mb-0"><i class="fas fa-sliders-h me-2"></i> Найти идеальное место</h5>
                        </div>
                        <div class="card-body p-4">
                            <div class="mb-4">
                                <label class="form-label fw-bold"><i class="fas fa-search me-1"></i> Куда едем?</label>
                                <input type="text" class="form-control" id="searchInput" placeholder="Город, страна...">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold"><i class="fas fa-mountain me-1"></i> Тип отдыха</label>
                                <select class="form-select" id="typeFilter">
                                    <option value="all">Любой</option>
                                    <option value="city">Город </option>
                                    <option value="nature">Природа </option>
                                    <option value="beach">Пляж </option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold"><i class="fas fa-wallet me-1"></i> Бюджет</label>
                                <select class="form-select" id="budgetFilter">
                                    <option value="all">Любой</option>
                                    <option value="budget">Бюджетный (до 30 000 ₽)</option>
                                    <option value="medium">Средний (30 000 - 80 000 ₽)</option>
                                    <option value="premium">Премиум (от 80 000 ₽)</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold"><i class="fas fa-calendar-alt me-1"></i> Длительность</label>
                                <select class="form-select" id="durationFilter">
                                    <option value="all">Любая</option>
                                    <option value="short">1-3 дня</option>
                                    <option value="medium">4-7 дней</option>
                                    <option value="long">7+ дней</option>
                                </select>
                            </div>
                            <button class="btn btn-secondary w-100 mt-2" id="resetFilters"><i class="fas fa-undo me-1"></i> Сбросить всё</button>
                        </div>
                    </div>
                </div>

                <div class="col-lg-9">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="h4 mb-0"><i class="fas fa-map-marker-alt text-primary me-2"></i>Направления</h3>
                        <span class="text-muted" id="resultsCount">0 найдено</span>
                    </div>
                    <div class="row g-4" id="destinationsList"></div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="destinationModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-info-circle"></i> Информация</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <i class="fas fa-code fa-4x text-primary mb-3"></i>
                    <p class="lead">заглужка</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer py-4 mt-5">
        <div class="container text-center">
            <p class="text-white-50 small mb-0"> Round the World</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const destinations = [
            { id:1, name:"Санкт-Петербург", type:"city", budget:"medium", duration:"medium", description:"Северная Венеция, музеи, разводные мосты", price:"50 000 ₽", days:"4-7 дней" },
            { id:2, name:"Алтай", type:"nature", budget:"budget", duration:"long", description:"Горы, озера, чистый воздух", price:"25 000 ₽", days:"7+ дней" },
            { id:3, name:"Москва", type:"city", budget:"premium", duration:"short", description:"Столица, Кремль, современная культура",price:"70 000 ₽", days:"1-3 дня" },
            { id:4, name:"Байкал", type:"nature", budget:"medium", duration:"medium", description:"Глубочайшее озеро в мире", price:"45 000 ₽", days:"4-7 дней" }
        ];

        function renderDestinations(filtered) {
            const container = document.getElementById('destinationsList');
            const countSpan = document.getElementById('resultsCount');
            if(filtered.length===0){ container.innerHTML=`<div class="col-12"><div class="alert alert-info text-center">Ничего не найдено. Попробуйте другие фильтры </div></div>`; countSpan.textContent='0 найдено'; return; }
            countSpan.textContent=`${filtered.length} направлений`;
            container.innerHTML = filtered.map(dest => `
                <div class="col-md-6">
                    <div class="card destination-card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
                        <img src="${dest.image}" class="card-img-top" style="height:200px;object-fit:cover;">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="fw-bold mb-0">${dest.name}</h5>
                                <span class="badge bg-primary">${dest.type==='city'?'Город':dest.type==='nature'?' Природа':'Пляж'}</span>
                            </div>
                            <p class="text-muted small">${dest.description}</p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <div><span class="fw-bold text-primary">${dest.price}</span><span class="text-muted small ms-1">• ${dest.days}</span></div>
                                <button class="btn btn-sm btn-outline-primary view-destination"><i class="fas fa-arrow-right me-1"></i>Подробнее</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.view-destination').forEach(btn => btn.addEventListener('click', () => new bootstrap.Modal(document.getElementById('destinationModal')).show()));
        }

        function filterDestinations() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const budget = document.getElementById('budgetFilter').value;
            const duration = document.getElementById('durationFilter').value;
            renderDestinations(destinations.filter(d => (!search || d.name.toLowerCase().includes(search)) && (type==='all' || d.type===type) && (budget==='all' || d.budget===budget) && (duration==='all' || d.duration===duration)));
        }

        document.getElementById('resetFilters').onclick = () => { document.getElementById('searchInput').value=''; document.getElementById('typeFilter').value='all'; document.getElementById('budgetFilter').value='all'; document.getElementById('durationFilter').value='all'; filterDestinations(); };
        ['searchInput','typeFilter','budgetFilter','durationFilter'].forEach(id => document.getElementById(id).oninput = filterDestinations);
        filterDestinations();
    </script>
</body>
</html>
